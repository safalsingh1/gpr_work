name: GSoC PyCUDA DPW Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Pytest
      run: |
        python -m pip install --upgrade pip
        pip install pytest numpy

    # Note: CUDA testing requires self-hosted runners or specific NVIDIA 
    # actions. This step validates the pure python structure syntax.
    - name: Run Python CPU-GPU Equivalence Tests
      run: |
        pytest tests/test_plane_wave_cpu_gpu.py -v

    - name: Compile 1D CUDA Prototype
      run: |
        # NVCC relies on the CUDA Toolkit being installed. 
        # Using a proxy compilation step.
        echo "Validating nvcc compilation..."
        if command -v nvcc &> /dev/null; then
            cd prototype_kernels
            nvcc dpw_update_test.cu -o dpw_test
        else
            echo "Skipping NVCC compile: CUDA toolkit not available on ubuntu-latest."
        fi
